; PlatformIO Project Configuration File
;
; Serial-to-Modbus Bridge for ESP32/ESP32-C3
; https://github.com/lahirunirmalx/ModbusMaster
;
; Build options:
;   -DUSE_RS485_DIR=1   Enable RS485 DE/RE direction control
;   -DBOARD_ESP32C3     Set by esp32-c3 environment automatically

[common]
lib_deps =
    https://github.com/lahirunirmalx/ModbusMaster#3a05ff87677a9bdd8e027d6906dc05ca15ca8ade

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}
; Uncomment to enable RS485 direction control:
; build_flags = -DUSE_RS485_DIR=1

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.mcu = esp32c3
lib_deps = ${common.lib_deps}
build_flags =
    -DBOARD_ESP32C3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Uncomment to enable RS485 direction control:
    ; -DUSE_RS485_DIR=1
